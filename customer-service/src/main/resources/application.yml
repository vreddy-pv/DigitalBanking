server:
  port: ${SERVICE_PORT:8005}

spring:
  application:
    name: customer-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/customer_db}
    username: ${DATABASE_USERNAME:customer_user}
    password: ${DATABASE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: ${JWT_SECRET:mySecretKey12345678901234567890123456789012}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.digitalbanking: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
