spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8001
          predicates:
            - Path=/api/v1/auth/**
        - id: account-service
          uri: http://localhost:8002
          predicates:
            - Path=/api/v1/accounts/**

server:
  port: 8000

logging:
  level:
    root: INFO
    com.digitalbanking: DEBUG
