databaseChangeLog:
  - changeSet:
      id: 001-create-transactions-table
      author: banking-team
      changes:
        - createTable:
            tableName: transactions
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: from_account_id
                  type: UUID
              - column:
                  name: to_account_id
                  type: UUID
              - column:
                  name: type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL(15, 2)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(255)
              - column:
                  name: request_id
                  type: VARCHAR(255)
                  constraints:
                    unique: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: completed_at
                  type: TIMESTAMP

  - changeSet:
      id: 002-create-transaction-audit-table
      author: banking-team
      changes:
        - createTable:
            tableName: transaction_audit
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: transaction_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_audit_transaction
                    references: transactions(id)
              - column:
                  name: status_before
                  type: VARCHAR(50)
              - column:
                  name: status_after
                  type: VARCHAR(50)
              - column:
                  name: reason
                  type: VARCHAR(255)
              - column:
                  name: timestamp
                  type: TIMESTAMP
                  constraints:
                    nullable: false

  - changeSet:
      id: 003-create-indexes
      author: banking-team
      changes:
        - createIndex:
            indexName: idx_transactions_from_account
            tableName: transactions
            columns:
              - column:
                  name: from_account_id
        - createIndex:
            indexName: idx_transactions_to_account
            tableName: transactions
            columns:
              - column:
                  name: to_account_id
        - createIndex:
            indexName: idx_transactions_created_at
            tableName: transactions
            columns:
              - column:
                  name: created_at
        - createIndex:
            indexName: idx_transaction_audit_transaction_id
            tableName: transaction_audit
            columns:
              - column:
                  name: transaction_id
