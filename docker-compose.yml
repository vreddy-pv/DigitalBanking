services:
  postgres:
    image: postgres:15-alpine
    container_name: digital-banking-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-network

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      JWT_SECRET: my-super-secret-key-for-jwt-tokens-please-change-in-production-minimum-256-bits
      JWT_EXPIRATION: 900000
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8001/api/v1/auth/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-network

  account-service:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    container_name: account-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/account_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-network

  transaction-service:
    build:
      context: .
      dockerfile: transaction-service/Dockerfile
    container_name: transaction-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/transaction_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-network

  ledger-service:
    build:
      context: .
      dockerfile: ledger-service/Dockerfile
    container_name: ledger-service
    depends_on:
      postgres:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ledger_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-network

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      account-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
      ledger-service:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: api-gateway
      SERVER_PORT: 8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: digital-banking-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-network

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://notification_user:password@postgres:5432/notification_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_QUEUE: transaction_events
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: ${NOTIFICATION_EMAIL:-noreply@digitalbanking.com}
      SMTP_PASSWORD: ${NOTIFICATION_PASSWORD:-dummy-password}
      SMTP_FROM: noreply@digitalbanking.com
      SERVICE_PORT: 8006
      SERVICE_HOST: 0.0.0.0
      ENV: development
      LOG_LEVEL: INFO
    ports:
      - "8006:8006"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8006/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-network

  digital-banking-ui:
    build:
      context: ./digital-banking-ui
      dockerfile: Dockerfile
    container_name: digital-banking-ui
    depends_on:
      auth-service:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4200
      API_BASE_URL: http://api-gateway:8000
      AUTH_API_URL: http://api-gateway:8000/api/v1/auth
      ACCOUNT_API_URL: http://api-gateway:8000/api/v1/accounts
      TRANSACTION_API_URL: http://api-gateway:8000/api/v1/transactions
      LEDGER_API_URL: http://api-gateway:8000/api/v1/ledger
    ports:
      - "4200:4200"
      - "4201:4200"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4200"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - banking-network

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  banking-network:
    driver: bridge
