databaseChangeLog:
  - changeSet:
      id: 001-create-customers-table
      author: banking-team
      changes:
        - createTable:
            tableName: customers
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: dob
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: phone
                  type: VARCHAR(20)
              - column:
                  name: address_line1
                  type: VARCHAR(255)
              - column:
                  name: address_line2
                  type: VARCHAR(255)
              - column:
                  name: city
                  type: VARCHAR(100)
              - column:
                  name: state
                  type: VARCHAR(100)
              - column:
                  name: zip_code
                  type: VARCHAR(10)
              - column:
                  name: country
                  type: VARCHAR(100)
              - column:
                  name: pan
                  type: VARCHAR(10)
              - column:
                  name: aadhar
                  type: VARCHAR(12)
              - column:
                  name: kyc_status
                  type: VARCHAR(50)
                  defaultValue: PENDING
              - column:
                  name: kyc_verified_at
                  type: TIMESTAMP
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

  - changeSet:
      id: 002-create-accounts-table
      author: banking-team
      changes:
        - createTable:
            tableName: accounts
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: customer_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_accounts_customer
                    references: customers(id)
              - column:
                  name: account_number
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: account_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: closed_at
                  type: TIMESTAMP

  - changeSet:
      id: 003-create-indexes
      author: banking-team
      changes:
        - createIndex:
            indexName: idx_customers_user_id
            tableName: customers
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_customers_email
            tableName: customers
            columns:
              - column:
                  name: email
        - createIndex:
            indexName: idx_accounts_customer_id
            tableName: accounts
            columns:
              - column:
                  name: customer_id
        - createIndex:
            indexName: idx_accounts_account_number
            tableName: accounts
            columns:
              - column:
                  name: account_number
